<!DOCTYPE html>
<html lang="pt-BR">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Semântico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f4f4;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            background-color: #ffffff;
            border: 1px solid #ddd;
        }
        header {
            background-color: #3498db;
            color: white;
            padding: 20px;
        }
        header h1 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        nav {
            background-color: #e67e22;
            padding: 15px;
        }
        nav ul {
            list-style-type: disc;
            padding-left: 20px;
        }
        nav ul li a {
            color: #0000ee;
            text-decoration: underline;
            font-size: 14px;
            line-height: 1.5;
        }
        main-content {
            padding: 20px;
        }
        section {
            background-color: #f1c40f;
            padding: 20px;
            margin-bottom: 20px;
        }
        section h2 {
            font-size: 18px;
            color: #000;
            margin-bottom: 15px;
        }
        article {
            background-color: #2ecc71;
            padding: 20px;
            color: #000;
        }
        article h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        article p {
            font-size: 14px;
        }
        aside {
            background-color: #9b59b6;
            color: white;
            padding: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
    </head>
    <body>
    <div class="container">
        <header>
            <h1>Título do Site (Header)</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Sobre</a></li>
                </ul>
            </nav>
        </header>
        <div class="main-content">
            <section>
                <h2>Nossa Missão (Section)</h2>
                <article>
                    <h3>História da Empresa (Article)</h3>
                    <p>Conteúdo independente...</p>
                </article>
            </section>
            <aside>
                Links Relacionados (Aside)
            </aside>
        </div>
        <footer>
            © 2026 - Rodapé Semântico
        </footer>
    </div>
    </body>
</html>
